# Pipeline Configurations

ingestion:
  supported_extensions:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".md"
    - ".html"
    - ".csv"
    - ".json"
    - ".py"
    - ".js"
    - ".ts"
    - ".java"
    - ".cpp"

  directories:
    upload_base_dir: "uploads"
    chroma_db_dir: "chroma_db"

chunking:
  strategies:
    - "fixed_size"
    - "sliding_window"
    - "semantic"
    - "paragraph"
    - "recursive_hierarchical"
    - "structure_aware"
    - "code_aware"

  defaults:
    fixed_size:
      size: 1500
      overlap: 150
    semantic:
      size: 512
      overlap: 50
    code_aware:
      size: 1000
      overlap: 200
    sliding_window:
      size: 1024
      overlap: 256
    recursive_hierarchical:
      size: 1500
      overlap: 150

decision_engine:
  thresholds:
    # Token count above which local Qdrant is preferred over Chroma
    local_max_tokens: 50000000
    # Token count above which Milvus is preferred for cloud deployments
    cloud_ultra_scale: 100000000
    # Number of metadata keys to consider a document "metadata heavy"
    metadata_heavy_count: 5
    # Ratio of high-density documents to trigger semantic chunking
    high_density_ratio: 0.5
